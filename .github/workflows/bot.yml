name: Run AstraQuant Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements_bot.txt

      - name: Create .env File
        run: |
          cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Verify .env File
        run: |
          echo ".env created successfully"
          ls -la
          grep -E "^(BOT_TOKEN|CHAT_ID|GROQ_API_KEY)=" .env | sed 's/=.*$/=***HIDDEN***/'

      - name: Run Bot
        run: python aq_telegram_bot.py
